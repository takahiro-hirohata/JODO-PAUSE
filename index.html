<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>状動-PAUSE</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-serif: "Noto Serif JP", "Yu Mincho", "Hiragino Mincho ProN", "Times New Roman", serif;
      --content-width: 46rem;
      --page-padding-x: 1.2rem;
      --color-text: #111;
      --color-muted: #666;
      --scrollbar-thumb: rgba(150, 150, 150, 0.3);
      --scrollbar-thumb-hover: rgba(150, 150, 150, 0.5);
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      color: var(--color-text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      overscroll-behavior-y: none;
    }

    main {
      height: 100vh;
      height: 100dvh;
      width: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar-thumb) transparent;
    }

    main::-webkit-scrollbar {
      width: 6px;
    }

    main::-webkit-scrollbar-track {
      background: transparent;
    }

    main::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 10px;
    }

    main::-webkit-scrollbar-thumb:hover {
      background: var(--scrollbar-thumb-hover);
    }

    .header-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
      z-index: 1000;
      height: env(safe-area-inset-top);
    }

    .header-inner {
      max-width: var(--content-width);
      margin: 0 auto;
      padding: 30px var(--page-padding-x) 0;
      box-sizing: border-box;
    }

    .lang-toggle {
      display: inline-block;
      pointer-events: auto;
      font-family: var(--font-serif);
      font-size: 0.95rem;
      color: var(--color-muted);
      cursor: pointer;
      letter-spacing: 0.05em;
    }

    .lang-toggle:hover {
      color: var(--color-text);
    }

    .lang-toggle span {
      display: inline-block;
      opacity: 0;
    }

    .page {
      height: 100vh;
      height: 100dvh;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;

      max-width: var(--content-width);
      margin: 0 auto;
      padding: 0 var(--page-padding-x);
      box-sizing: border-box;
      position: relative;
      scroll-snap-align: center;
      overflow: hidden;
    }

    .last-page {
      justify-content: flex-end;
      padding-bottom: 3rem;
      padding-bottom: calc(3rem + env(safe-area-inset-bottom));
      position: relative;
    }

    .title-content {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 2.5s ease, transform 2.5s ease;
    }

    .page.is-visible .title-content {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 1.5s ease, transform 1.5s ease;
    }

    .circle-pictogram {
      opacity: 0;
      transition: opacity 2.5s ease;
      width: 126.5px;
      height: 126.5px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      box-sizing: border-box;
    }

    .page.is-visible .circle-pictogram {
      opacity: 1;
      transition: opacity 2.5s ease-in-out;
    }

    .text-page p {
      opacity: 1;
    }

    p,
    h1,
    h2,
    h3,
    footer {
      font-family: var(--font-serif);
      line-height: 2;
      letter-spacing: 0.02em;
    }

    h2 {
      color: var(--color-muted);
      font-size: 0.95rem;
      text-align: left;
      margin-bottom: 0.2rem;
      margin-top: 0;
    }

    h1 {
      color: var(--color-text);
      font-size: 1.4rem;
      font-weight: 600;
      text-align: left;
      letter-spacing: 0.05em;
      margin-top: 0;
      margin-bottom: 0;
    }

    p {
      margin: 0;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .text-fragment {
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    h3 {
      color: var(--color-muted);
      font-size: 0.9rem;
      text-align: right;
      margin: 0;
    }

    footer {
      border-top: 1px solid #ddd;
      padding-top: 1rem;
      font-size: 0.85rem;
      color: #777;
      text-align: center;
      width: 100%;
      opacity: 0; /* 初期状態を非表示に設定 */
    }

    .scroll-arrow {
      position: fixed;
      bottom: calc(40px + env(safe-area-inset-bottom));
      left: 50%;
      width: 14px;
      height: 14px;
      border-right: 2px solid #aaa;
      border-bottom: 2px solid #aaa;
      transform: translateX(-50%) rotate(45deg);

      opacity: 0;
      pointer-events: auto;
      z-index: 100;
      cursor: pointer;
    }

    .scroll-arrow::after {
      content: "";
      position: absolute;
      top: -15px;
      bottom: -15px;
      left: -15px;
      right: -15px;
    }

    @keyframes arrowBounce {
      0%, 100% { transform: translateX(-50%) rotate(45deg) translate(0, 0); }
      50% { transform: translateX(-50%) rotate(45deg) translate(8px, 8px); }
    }

    .pictogram-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .pictogram-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }

    .circle-pictogram img {
      max-width: 100%;
      max-height: 100%;
      display: block;
      object-fit: contain;
    }

    .contact-icon-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 4.0s ease;
      pointer-events: none;
      z-index: 50;
    }

    .contact-icon-container.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .contact-icon-container a {
      display: block;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .contact-icon-container img {
      width: 110px;
      height: 110px;
      display: block;
      object-fit: contain;
    }

  </style>
</head>
<body>

  <header class="header-container">
    <div class="header-inner">
      <div id="langToggle" class="lang-toggle"></div>
    </div>
  </header>

  <div class="scroll-arrow" id="scrollArrow"></div>

  <main id="scrollContainer">
    <div class="page">
      <div class="title-content">
        <h2> </h2>
        <h1>状動-PAUSE</h1>
      </div>
    </div>

    <div class="page pictogram-page">
      <div class="pictogram-container">
        <div class="circle-pictogram">
          <img src="images/pictogram-01.png" alt="着席OK">
        </div>
        <div class="circle-pictogram">
          <img src="images/pictogram-02.png" alt="大声での会話を控える">
        </div>
        <div class="circle-pictogram">
          <img src="images/pictogram-03.png" alt="スマホの使用を控える">
        </div>
      </div>
    </div>

    <div class="page text-page">
      <p data-ja="たちどまり、 息を吸い 息を吐いて、" 
         data-en="Come to a halt, breathe in, breathe out."></p>
    </div>

    <div class="page text-page">
      <p data-ja="そうして、一拍おいて。 無理に前へ進もうとしないこと。" 
         data-en="Pause for a moment. Don’t force yourself to move forward."></p>
    </div>

    <div class="page text-page">
      <p data-ja="周囲が、周りが、世界が。 そうした時間の流れから、一度、離れてみる。" 
         data-en="Here—step away from the flow of time."></p>
    </div>

    <div class="page text-page">
      <p data-ja="そうして、「いま」と出会う。" 
         data-en="Encounter the “now.”"></p>
    </div>

    <div class="page text-page">
      <p data-ja="今、まさにこの瞬間のあなたと出会う。" 
         data-en="Encounter yourself in this very moment."></p>
    </div>

    <div class="page text-page">
      <p data-ja="ただ、ある、状態と向き合い、対面する。 直面する。" 
         data-en="Experience the state of simply being. Face it head-on."></p>
    </div>

    <div class="page text-page">
      <p data-ja="そうして、存在自体と対峙する。" 
         data-en="Confront existence itself."></p>
    </div>

    <div class="page text-page">
      <p data-ja="まずは、あなたがあって。&#10;それ以上は何も無いはず。" 
         data-en="First and foremost, you are here.&#10;There is nothing more than that."></p>
    </div>

    <div class="page text-page">
      <p data-ja="それでいいはず、" 
         data-en="It is enough."></p>
    </div>

    <div class="page text-page">
      <p data-ja="全てを創造性に還元しすぎないこと。" 
         data-en="Not everything needs to turn into creativity."></p>
    </div>

    <div class="page blank-page"></div>

    <div class="page last-page">
      <div class="contact-icon-container" id="contactIconContainer">
        <a href="https://forms.gle/EDWTkpRhHekpbrn56" id="contactLink">
          <img src="images/pictogram-04.png" alt="Contact">
        </a>
      </div>
      <footer>
        状動-PAUSE, © 2026<br>
        by Takahiro Yahata.<br>
        English Translation Advice: John Einarsen.
      </footer>
    </div>
  </main>

  <script>
    const LANGUAGES = ['ja', 'en'];
    
    const PAUSES = {
      0.3: {
        ja: ['、', ' '],
        en: [',', '-', '—']
      },
      0.5: {
        ja: ['。'],
        en: ['.']
      },
      0.1: {
        ja: ['」', '』'],
        en: ['”']
      }
    };

    const TIMING = {
      charDelay: 0.13,
      textFade: 1.5,
      textExitFade: 2.5,
      textArrowDelay: 0.3,
      langAfterTextDelay: 3.0,
      normalArrowDelayMs: 100,
      normalArrowFade: 0.8,
      textArrowFade: 3.0,
      textArrowBounceDelayMs: 5000,
      pictogramLockMs: 2500,
      normalLockMs: 1500,
      autoScrollMs: 50,
      smoothScrollMs: 800,
      swipeThreshold: 40
    };

    const pages = Array.from(document.querySelectorAll('.page'));
    const textPages = Array.from(document.querySelectorAll('.page.text-page'));
    const arrow = document.getElementById('scrollArrow');
    const main = document.getElementById('scrollContainer');
    const langToggleBtn = document.getElementById('langToggle');

    const state = {
      currentPageIndex: 0,
      currentLang: new URLSearchParams(window.location.search).get('lang') === 'en' ? 'en' : 'ja',
      isDownScrollLocked: false,
      isLastPage: false,
      isScrolling: false,
      touchStartY: 0,
      isArrowScroll: false // スクロールボタン経由での遷移かを判定するフラグ
    };

    const timers = {
      arrowShow: null,
      arrowBounce: null,
      downScroll: null,
      contactIcon: null,
      footerFadeIn: null // フッターフェードイン用のタイマー
    };

    function clearTimer(name) {
      clearTimeout(timers[name]);
      timers[name] = null;
    }

    function setTimer(name, callback, delay) {
      clearTimer(name);
      timers[name] = setTimeout(callback, delay);
    }

    function isTextPage(page) {
      return page && page.classList.contains('text-page');
    }

    function isPictogramPage(page) {
      return page && page.classList.contains('pictogram-page');
    }

    function isBlankPage(page) {
      return page && page.classList.contains('blank-page');
    }

    function getTextCompleteTime(maxDelay) {
      return maxDelay + TIMING.textFade;
    }

    function getTextLockDuration(maxDelay) {
      return (getTextCompleteTime(maxDelay) + TIMING.textArrowDelay) * 1000;
    }

    function setDownScrollLock(duration) {
      state.isDownScrollLocked = true;
      setTimer('downScroll', () => {
        state.isDownScrollLocked = false;
      }, duration);
    }

    function updateLanguageDisplay(includeWrappers = false) {
      const wrapperSelector = includeWrappers ? '' : ':not(.lang-wrapper)';

      document.querySelectorAll(`.lang-ja${wrapperSelector}`).forEach(el => {
        el.style.display = state.currentLang === 'ja' ? 'inline' : 'none';
      });
      document.querySelectorAll(`.lang-en${wrapperSelector}`).forEach(el => {
        el.style.display = state.currentLang === 'en' ? 'inline' : 'none';
      });
    }

    function hideElementsInstantly() {
      clearTimer('arrowShow');
      clearTimer('arrowBounce');

      arrow.style.transition = 'none';
      arrow.style.opacity = '0';
      arrow.style.animation = 'none';

      langToggleBtn.querySelectorAll('span').forEach(span => {
        span.style.transition = 'none';
        span.style.opacity = '0';
      });

      void arrow.offsetWidth;
      void langToggleBtn.offsetWidth;
    }

    function scheduleTextPageArrow(textCompleteTime) {
      if (state.isLastPage) return;

      const delayBeforeShow = (textCompleteTime + TIMING.textArrowDelay) * 1000;

      setTimer('arrowShow', () => {
        arrow.style.transition = `opacity ${TIMING.textArrowFade}s ease`;
        arrow.style.opacity = '1';

        setTimer('arrowBounce', () => {
          arrow.style.animation = 'arrowBounce 2.5s infinite ease-in-out';
        }, TIMING.textArrowBounceDelayMs);
      }, delayBeforeShow);
    }

    function showArrowForNormalPage() {
      if (state.isLastPage) return;

      setTimer('arrowShow', () => {
        arrow.style.transition = `opacity ${TIMING.normalArrowFade}s ease`;
        arrow.style.opacity = '1';
        arrow.style.animation = 'arrowBounce 2.5s infinite ease-in-out';
      }, TIMING.normalArrowDelayMs);
    }

    function showArrowForBlankPage() {
      if (state.isLastPage) return;

      setTimer('arrowShow', () => {
        arrow.style.transition = `opacity 4.0s ease`;
        arrow.style.opacity = '1';

        setTimer('arrowBounce', () => {
          arrow.style.animation = 'arrowBounce 2.5s infinite ease-in-out';
        }, 5000);
      }, 1000);
    }

    function getFragmentDelay(lang, char, prevChar, nextChar, currentDelay) {
      const randomCharDelay = 0.12 + Math.random() * 0.02;
      let extraDelay = 0;

      if (PAUSES[0.3][lang] && PAUSES[0.3][lang].includes(char)) {
        extraDelay += 0.3;
      }

      if (PAUSES[0.5][lang] && PAUSES[0.5][lang].includes(char)) {
        const isDeferred = nextChar && PAUSES[0.1][lang] && PAUSES[0.1][lang].includes(nextChar);
        if (!isDeferred) {
          extraDelay += 0.5;
        }
      }

      if (PAUSES[0.1][lang] && PAUSES[0.1][lang].includes(char)) {
        extraDelay += 0.1;
        const hasDeferred = prevChar && PAUSES[0.5][lang] && PAUSES[0.5][lang].includes(prevChar);
        if (hasDeferred) {
          extraDelay += 0.5;
        }
      }

      return currentDelay + randomCharDelay + extraDelay;
    }

    function createLanguageWrapper(lang, text) {
      const wrapper = document.createElement('span');
      wrapper.className = `lang-wrapper lang-${lang}`;
      if (lang !== state.currentLang) wrapper.style.display = 'none';

      let currentDelay = 0;
      const charArray = Array.from(text);
      
      charArray.forEach((char, index) => {
        const prevChar = index > 0 ? charArray[index - 1] : null;
        const nextChar = index < charArray.length - 1 ? charArray[index + 1] : null;
        
        const span = document.createElement('span');
        span.textContent = char;
        span.classList.add('text-fragment');
        
        span.dataset.delay = currentDelay.toFixed(3);
        wrapper.appendChild(span);

        currentDelay = getFragmentDelay(lang, char, prevChar, nextChar, currentDelay);
      });

      return wrapper;
    }

    function buildTextFragments() {
      textPages.forEach(page => {
        const paragraph = page.querySelector('p');
        if (!paragraph) return;

        const texts = {
          ja: paragraph.getAttribute('data-ja') || '',
          en: paragraph.getAttribute('data-en') || ''
        };

        paragraph.textContent = '';
        LANGUAGES.forEach(lang => {
          paragraph.appendChild(createLanguageWrapper(lang, texts[lang]));
        });
      });
    }

    function setFragmentVisibility(fragment, opacity, duration, delay = '0s') {
      fragment.style.transitionDuration = duration;
      fragment.style.transitionDelay = delay;
      fragment.style.opacity = opacity;
    }

    function revealActiveText(page) {
      const activeWrapper = page.querySelector(`.lang-wrapper.lang-${state.currentLang}`);
      if (!activeWrapper) return 0;

      let maxDelay = 0;
      activeWrapper.querySelectorAll('.text-fragment').forEach(fragment => {
        const delay = parseFloat(fragment.dataset.delay);
        setFragmentVisibility(fragment, '1', `${TIMING.textFade}s`, `${delay}s`);
        if (delay > maxDelay) maxDelay = delay;
      });

      return maxDelay;
    }

    function hidePageText(page) {
      page.querySelectorAll('.text-fragment').forEach(fragment => {
        setFragmentVisibility(fragment, '0', `${TIMING.textExitFade}s`, '0s');
      });
    }

    function resetPageTextInstantly(page) {
      page.querySelectorAll('.text-fragment').forEach(fragment => {
        fragment.style.transitionDuration = '0s';
        fragment.style.opacity = '0';
      });

      void page.offsetWidth;
    }

    function animateLangToggle(page, textMaxDelay = 0) {
      const toggleText = state.currentLang === 'ja' ? 'EN/' : 'JP/';
      const transform = state.currentLang === 'ja' ? 'translateX(-0.15em)' : 'translateX(-0.08em)';

      langToggleBtn.innerHTML = '';
      langToggleBtn.style.transform = transform;

      Array.from(toggleText).forEach(char => {
        const span = document.createElement('span');
        span.textContent = char;
        langToggleBtn.appendChild(span);
      });

      void langToggleBtn.offsetWidth;

      langToggleBtn.querySelectorAll('span').forEach((span, index) => {
        if (isTextPage(page)) {
          const baseDelay = textMaxDelay + TIMING.textFade + TIMING.langAfterTextDelay;
          span.style.transition = `opacity ${TIMING.textFade}s ease`;
          span.style.transitionDelay = `${baseDelay + (index * TIMING.charDelay)}s`;
        } else if (isPictogramPage(page)) {
          span.style.transition = 'opacity 2.5s ease-in-out';
          span.style.transitionDelay = '0s';
        } else if (isBlankPage(page)) {
          span.style.transition = 'opacity 4.0s ease';
          span.style.transitionDelay = '1.0s';
        } else {
          span.style.transition = `opacity ${TIMING.textFade}s ease`;
          span.style.transitionDelay = '0s';
        }

        span.style.opacity = '1';
      });
    }

    function showTextPage(page) {
      const maxDelay = revealActiveText(page);
      const textCompleteTime = getTextCompleteTime(maxDelay);

      scheduleTextPageArrow(textCompleteTime);

      return {
        maxDelay,
        lockDuration: getTextLockDuration(maxDelay)
      };
    }

    function showPage(page) {
      page.classList.add('is-visible');
      state.currentPageIndex = pages.indexOf(page);
      state.isLastPage = page === pages[pages.length - 1];

      hideElementsInstantly();

      let maxDelay = 0;
      let lockDuration = TIMING.normalLockMs;

      if (isTextPage(page)) {
        const textState = showTextPage(page);
        maxDelay = textState.maxDelay;
        lockDuration = textState.lockDuration;
      } else if (isPictogramPage(page)) {
        lockDuration = TIMING.pictogramLockMs;
        showArrowForNormalPage();
      } else if (isBlankPage(page)) {
        lockDuration = TIMING.normalLockMs;
        showArrowForBlankPage();
      } else {
        showArrowForNormalPage();
      }

      if (state.isLastPage) {
        const iconContainer = page.querySelector('#contactIconContainer');
        if (iconContainer) {
          setTimer('contactIcon', () => {
            iconContainer.classList.add('is-visible');
          }, 3000);
        }

        // フッターの表示制御を追加
        const footer = page.querySelector('footer');
        if (footer) {
          if (state.isArrowScroll) {
            // ボタンによるスクロール遷移時
            footer.style.transition = 'opacity 2.5s ease';
            setTimer('footerFadeIn', () => {
              footer.style.opacity = '1';
            }, 500);
            state.isArrowScroll = false; // 処理後にフラグをリセット
          } else {
            // スワイプやホイールなどその他のスクロール時
            footer.style.transition = 'none';
            footer.style.opacity = '1';
          }
        }
      }

      animateLangToggle(page, maxDelay);
      setDownScrollLock(lockDuration);
    }

    function hidePage(page) {
      page.classList.remove('is-visible');
      if (isTextPage(page)) hidePageText(page);

      if (page.classList.contains('last-page')) {
        clearTimer('contactIcon');
        clearTimer('footerFadeIn'); // フッター用のタイマーもクリア
        
        const iconContainer = page.querySelector('#contactIconContainer');
        if (iconContainer) {
          iconContainer.classList.remove('is-visible');
        }

        // ページを離れる際にフッターを非表示に戻す
        const footer = page.querySelector('footer');
        if (footer) {
          footer.style.opacity = '0';
          footer.style.transition = 'none';
        }
      }
    }

    function updateUrlForLanguage() {
      const newUrl = window.location.pathname + (state.currentLang === 'en' ? '?lang=en' : '');
      window.history.replaceState(null, '', newUrl);
    }

    function toggleLanguage() {
      state.currentLang = state.currentLang === 'ja' ? 'en' : 'ja';

      updateUrlForLanguage();
      updateLanguageDisplay(true);

      const visiblePage = pages[state.currentPageIndex];
      if (!isTextPage(visiblePage)) {
        animateLangToggle(visiblePage, 0);
        return;
      }

      resetPageTextInstantly(visiblePage);
      hideElementsInstantly();

      const maxDelay = revealActiveText(visiblePage);
      const textCompleteTime = getTextCompleteTime(maxDelay);

      scheduleTextPageArrow(textCompleteTime);
      animateLangToggle(visiblePage, maxDelay);
      setDownScrollLock(getTextLockDuration(maxDelay));
    }

    function getScrollBehavior(index, isInstantAction) {
      if (isInstantAction || index === 1 || state.currentPageIndex === 1) {
        return 'auto';
      }
      return 'smooth';
    }

    function scrollToPage(index, isInstantAction = false) {
      if (index < 0 || index >= pages.length) return;

      hideElementsInstantly();

      const behavior = getScrollBehavior(index, isInstantAction);
      state.isScrolling = true;
      state.currentPageIndex = index;
      pages[index].scrollIntoView({ behavior });

      setTimeout(() => {
        state.isScrolling = false;
      }, behavior === 'auto' ? TIMING.autoScrollMs : TIMING.smoothScrollMs);
    }

    function handleForwardScroll() {
      if (state.isDownScrollLocked) return;
      scrollToPage(state.currentPageIndex + 1);
    }

    function handleWheel(e) {
      e.preventDefault();
      if (state.isScrolling) return;

      if (e.deltaY > 0) {
        state.isArrowScroll = false; // ホイール操作時はフラグを折る
        handleForwardScroll();
      } else if (e.deltaY < 0) {
        state.isArrowScroll = false; // ホイール操作時はフラグを折る
        scrollToPage(state.currentPageIndex - 1);
      }
    }

    function handleTouchStart(e) {
      state.touchStartY = e.touches[0].clientY;
    }

    function handleTouchMove(e) {
      e.preventDefault();
    }

    function handleTouchEnd(e) {
      if (state.isScrolling) return;

      const touchEndY = e.changedTouches[0].clientY;
      const diff = state.touchStartY - touchEndY;

      if (diff > TIMING.swipeThreshold) {
        state.isArrowScroll = false; // スワイプ操作時はフラグを折る
        handleForwardScroll();
      } else if (diff < -TIMING.swipeThreshold) {
        state.isArrowScroll = false; // スワイプ操作時はフラグを折る
        scrollToPage(state.currentPageIndex - 1);
      }
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          showPage(entry.target);
        } else {
          hidePage(entry.target);
        }
      });
    }, {
      threshold: 0.5
    });

    updateLanguageDisplay(false);
    buildTextFragments();
    pages.forEach(page => observer.observe(page));

    langToggleBtn.addEventListener('click', toggleLanguage);
    main.addEventListener('wheel', handleWheel, { passive: false });
    main.addEventListener('touchstart', handleTouchStart, { passive: true });
    main.addEventListener('touchmove', handleTouchMove, { passive: false });
    main.addEventListener('touchend', handleTouchEnd);
    
    arrow.addEventListener('click', () => {
      if (state.isLastPage || state.isScrolling || state.isDownScrollLocked) return;
      state.isArrowScroll = true; // スクロールボタンが押されたフラグを立てる
      scrollToPage(state.currentPageIndex + 1, true);
    });

    const contactLink = document.getElementById('contactLink');
    if (contactLink) {
      contactLink.addEventListener('click', function(e) {
        e.preventDefault();
        const targetUrl = this.getAttribute('href');
        
        setTimeout(() => {
          window.open(targetUrl, '_blank');
        }, 400);
      });
    }

  </script>

</body>
</html>
